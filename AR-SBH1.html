                { id: 7, q: "Apakah jenis kain yang dipakaikan pada tubuh haiwan korban sebagai simbol pakaian terakhir roh?", o: ["Kain bertenun emas", "Kain selendang Sandai", "Kain pelikat", "Kain putih bermanik"], a: 2, hint: "Pakaian sarung tradisi lelaki yang sering bermotif kotak-kotak." },
                { id: 8, q: "Berapakah ukuran kedalaman lubang tanah yang dikorek sebagai takungan untuk aliran darah haiwan korban?", o: ["Sedalam 1 kaki", "Sedalam 3 kaki", "Sedalam 5 kaki", "Sedalam 7 kaki"], a: 0, hint: "Ukuran kedalaman pembaris sekolah standard (12 inci)." },
                { id: 9, q: "Apakah alat alami yang ditiup ke arah daging haiwan korban sebelum proses melapah dimulakan?", o: ["Batang buluh muda", "Batang daun betik", "Batang pokok pisang", "Seruling tradisional"], a: 1, hint: "Batang daripada tumbuhan berongga yang buahnya berwarna jingga manis apabila masak." },
                { id: 10, q: "Antara berikut, manakah kombinasi makanan istimewa yang diberikan kepada haiwan korban semasa persediaan?", o: ["Ubi kayu dan pisang", "Nasi kuning dan kopi (atau makanan kegemaran arwah)", "Rumput segar dan air garam", "Padi huma dan air kelapa"], a: 1, hint: "Sajian karbohidrat beras berwarna kuning cerah ditemani minuman hitam pekat." },
                { id: 11, q: "Mengapakah pemakaian kain pelikat pada haiwan korban dianggap sangat wajib bagi masyarakat Bajau Ubian?", o: ["Supaya tidak sejuk", "Khuatir roh si mati memasuki Padang Mahsyar dalam keadaan berbogel (aib maruah)", "Elak daging terkena kotoran", "Hiasan pelamin"], a: 1, hint: "Untuk menjaga aib dan maruah arwah agar tidak terlanjur tanpa busana di alam sana." },
                { id: 12, q: "Bagaimanakah pengurusan helaian kertas catatan butiran arwah dilakukan SELEPAS selesai upacara penyembelihan?", o: ["Dibakar abunya ditiup angin", "Simpan dalam tajau rumah", "Direndam bersama darah haiwan korban dan ditanam di tapak penyembelihan", "Serah semula kepada isteri arwah"], a: 2, hint: "Disatukan dengan cecair hayat sembelihan lalu dikubur bersama di lubang takungan." },
                { id: 13, q: "Apakah tanda atau isyarat awal yang dinaikkan oleh keluarga di hadapan rumah untuk memaklumkan kematian?", o: ["Bendera atau kain putih", "Bendera merah bertingkat", "Kain baldu bersulam emas", "Pukulan gong serentak"], a: 0, hint: "Tekstil ringkas tanpa corak berwarna putih dikibarkan di tiang depan rumah." },
                { id: 14, q: "Berapakah jumlah bilangan ganjil dulang hantaran sedekah (Lampai Kapataiyan) yang wajib disediakan mengikut jantina?", o: ["Lelaki 3, Wanita 5", "Lelaki 5, Wanita 7", "Lelaki 7, Wanita 5", "Lelaki 9, Wanita 9"], a: 2, hint: "Kuantiti dulang lelaki adalah paling tinggi (tujuh) berbanding wanita (lima)." },
                { id: 15, q: "Apakah nama istilah tempatan bagi batu nisan dalam adat pengebumian masyarakat Bajau?", o: ["Luhul", "Sunduk", "Sundi", "Sandai"], a: 1, hint: "Nama bermula dengan huruf S dan diakhiri dengan 'duk'." },
                { id: 16, q: "Bagaimanakah cara untuk membezakan jantina si mati berdasarkan bentuk fizikal batu nisan (sunduk)?", o: ["Lelaki leper, Wanita bulat", "Lelaki berbentuk bulat, Wanita berbentuk leper", "Lelaki manik merah, Wanita kain putih", "Lelaki perak, Wanita kayu belian"], a: 1, hint: "Nisan lelaki mempunyai potongan silinder berpusing (bulat), manakala wanita dipotong nipis papan (leper)." },
                { id: 17, q: "Apakah yang dimaksudkan dengan 'Dinding Hali' yang berjumlah 15 hingga 20 batang di dalam kuburan?", o: ["Payung rangka empat segi", "Bendera kecil berwarna", "Kayu jenis belian yang disusun untuk menutupi mayat", "Kain putih atas kubur"], a: 2, hint: "Susunan struktur kayu belian keras pelindung jasad dari runtuhan tanah." },
                { id: 18, q: "Berapakah bilangan pusingan ahli keluarga dikehendaki melintas di bawah keranda (Pasuhuk) semasa diusung?", o: ["1 kali", "3 kali", "5 kali", "7 kali"], a: 1, hint: "Kekerapan melintas di bawah keranda yang sama dengan jumlah kali sembur air padam lilin." },
                { id: 19, q: "Apakah nama kenduri tahunan yang diadakan oleh keluarga mengikut kalendar bagi memperingati pemergian arwah?", o: ["Bahangi Heya", "Bahangi Silung", "Kammattian", "Kok Dulang"], a: 2, hint: "Sebutannya hampir sama dengan istilah 'kematian' dalam bahasa Melayu rasmi." },
                { id: 20, q: "Apakah tujuan utama dilakukan ritual 'Pasuhuk' (melintas di bawah keranda) oleh ahli keluarga?", o: ["Tuntut ganti rugi tanah", "Agar si mati tidak mengingati keluarga yang hidup sekali gus elak gangguan rohani (keteguran)", "Memastikan keranda ringan", "Isyarat tarian terakhir"], a: 1, hint: "Memotong rantaian ingatan emosi roh kepada ahli keluarga agar tidak membawa penyakit keteguran." },
                { id: 21, q: "Apakah pantang larang komuniti sekiranya terserempak dengan rombongan membawa jenazah di jalanan?", o: ["Berpatah balik lari pulang", "Barangan air atau makanan (terutamanya beras) yang dipegang wajib dibuang ke tanah", "Menyanyi lagu moninjau", "Wajib ikut sampai kubur"], a: 1, hint: "Makanan/beras di tangan mesti dicurahkan ke bumi untuk menolak bala bawaan jenazah." },
                { id: 22, q: "Apakah yang dimaksudkan dengan istilah 'Bangkai-Bangkaian' selepas fasa pengebumian?", o: ["Replika keranda batang pisang", "One set tempat tidur lengkap dengan bantal dan susunan pakaian si mati", "Hidangan talam kanak-kanak", "Boneka kain halau hantu"], a: 1, hint: "Susunan formasi tilam, bantal dan busana membentuk jasad simulasi arwah di dalam rumah." },
                { id: 23, q: "Mengapakah kenduri tujuh hari (Bahangi Pitu’) dianggap sebagai kenduri arwah yang paling besar dalam kategori Bahangi Heya?", o: ["Sajian wajib daging kerbau", "Diadakan adat Magparuaih Umagad (menurunkan roh) yang dipercayai hari terakhir roh di rumah", "Majlis dipimpin Bobolian Ranau", "Batu nisan dicabut semula"], a: 1, hint: "Ada upacara penurunan atau pelepasan roh pada hari terakhirnya berada di persekitaran rumah." },
                { id: 24, q: "Suku Bajau Ubian/Sikubung mengamalkan adat 'Magjaga-Jaga' kubur. Apakah sebab logik geografi adat ini dilakukan?", o: ["Bimbang batu nisan dicuri", "Tanah pulau keras/berbatu menyebabkan kubur cetek, bau mayat merangsang anjing/babi hutan menyelongkar", "Syarat mutlak agama Islam", "Elak manusia bawah tanah merebut tapak"], a: 1, hint: "Struktur bumi kepulauan Semporna yang berbatu menghadkan kedalaman liang, mengundang ancaman haiwan liar penusuk bau." },
                { id: 25, q: "Apakah entiti mistik laut yang dikhuatiri akan menyelongkar kubur jika adat Magjaga-Jaga diabaikan?", o: ["Kang-Kang Laut (Hantu laut)", "Jin bawah tanah Nunuk Ragang", "Penganggun berniat jahat", "Roh terkena libas"], a: 0, hint: "Nama hantu air/maritim tempatan yang bermula dengan suku kata 'Kang'." }
            ]
        }
    ];

    let currentTopicIndex = 0;
    let wrongQuestionsPool = []; // Menyimpan soalan yang salah untuk pusingan ulangan
    let isRemediationLoop = false; // Status mod sama ada pusingan utama atau pusingan pembetulan

    // FUNGSI MEMULAKAN UTAMA/TOPIK BAHARU
    function initTopic() {
        isRemediationLoop = false;
        wrongQuestionsPool = [];
        
        const data = database[currentTopicIndex];
        
        // Kemas kini komponen teks
        document.getElementById("note-topic-badge").innerText = data.badge;
        document.getElementById("notes-content").innerHTML = data.notesHTML;
        document.getElementById("loop-status").innerText = "Pusingan Utama (25 Soalan)";
        document.getElementById("loop-status").className = "badge bg-dark fs-6";
        document.getElementById("score-display").classList.add("d-none");
        document.getElementById("quiz-intro-msg").classList.remove("d-none");
        
        document.getElementById("btn-action").classList.remove("d-none");
        document.getElementById("btn-next-topic").classList.add("d-none");

        // Render senarai soalan utama
        renderQuestions(data.questions);
        document.getElementById("notes-panel").scrollTop = 0;
        document.getElementById("quiz-panel").scrollTop = 0;
    }

    // FUNGSI BINA & PAPAR SOALAN PADA SKRIN
    function renderQuestions(questionsArray) {
        const container = document.getElementById("questions-list");
        container.innerHTML = "";

        questionsArray.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "quiz-card";
            card.id = `qcard-${item.id}`;
            
            // Set data atribut rahsia untuk rujukan semakan jawapan nanti
            card.setAttribute("data-qid", item.id);
            card.setAttribute("data-correctidx", item.a);

            let optionsHTML = "";
            item.o.forEach((opt, oIdx) => {
                optionsHTML += `
                    <label class="option-label" id="label-${item.id}-${oIdx}">
                        <input type="radio" name="name-q-${item.id}" value="${oIdx}" class="form-check-input me-2">
                        ${opt}
                    </label>
                `;
            });

            card.innerHTML = `
                <p class="fw-bold mb-2 text-dark">${index + 1}. ${item.q}</p>
                <div>${optionsHTML}</div>
                <div class="hint-text" id="hint-${item.id}">💡 Petunjuk: ${item.hint}</div>
            `;
            container.appendChild(card);
        });
    }

    // FUNGSI UTAMA: SEMAK & NILAI JAWAPAN MURID
    function evaluateQuiz() {
        const data = database[currentTopicIndex];
        const cardsList = document.getElementById("questions-list").getElementsByClassName("quiz-card");
        
        let currentQuestionsSet = isRemediationLoop ? wrongQuestionsPool : data.questions;
        let correctCount = 0;
        let localWrongPool = [];

        // Gelung semakan jawapan pilihan murid
        for (let card of cardsList) {
            const qid = parseInt(card.getAttribute("data-qid"));
            const correctIdx = parseInt(card.getAttribute("data-correctidx"));
            const selectedRadio = card.querySelector(`input[name="name-q-${qid}"]:checked`);
            
            // Cari objek soalan sebenar untuk disimpan jika salah
            const originalQuestionObj = data.questions.find(q => q.id === qid);

            // Bersihkan gaya lama jika ada pusingan ulangan
            const labels = card.getElementsByClassName("option-label");
            for(let lbl of labels) { lbl.className = "option-label"; }
            document.getElementById(`hint-${qid}`).style.display = "none";

            if (selectedRadio) {
                const userAns = parseInt(selectedRadio.value);
                if (userAns === correctIdx) {
                    correctCount++;
                    document.getElementById(`label-${qid}-${userAns}`).classList.add("correct-bg");
                } else {
                    // Jawapan salah dipilih murid
                    document.getElementById(`label-${qid}-${userAns}`).classList.add("wrong-bg");
                    document.getElementById(`label-${qid}-${correctIdx}`).classList.add("correct-bg");
                    document.getElementById(`hint-${qid}`).style.display = "block";
                    localWrongPool.push(originalQuestionObj);
                }
            } else {
                // Kes jika murid tertinggal / tidak tanda jawapan langsung
                document.getElementById(`label-${qid}-${correctIdx}`).classList.add("correct-bg");
                document.getElementById(`hint-${qid}`).style.display = "block";
                localWrongPool.push(originalQuestionObj);
            }
        }

        // Papar Skor dan Bar Kemajuan Interaktif
        const scoreDisplay = document.getElementById("score-display");
        const scoreText = document.getElementById("score-result-text");
        const scoreBar = document.getElementById("score-bar");
        
        scoreDisplay.classList.remove("d-none");
        let totalCountCurrentRun = currentQuestionsSet.length;
        let percentage = (correctCount / totalCountCurrentRun) * 100;
        
        scoreBar.style.width = `${percentage}%`;
        scoreText.innerText = `Skor Pusingan Ini: ${correctCount} / ${totalCountCurrentRun}`;

        // ANALISIS LOGIK MASTERI (PENGUASAAN MUTLAK)
        if (localWrongPool.length === 0) {
            // Berjaya skor 100% betul belaka!
            scoreText.innerHTML = `🎉 Tahniah! Anda Berjaya Mencapai Skor Sempurna (${correctCount}/${totalCountCurrentRun}) & Menguasai Adat Ini!`;
            scoreBar.className = "progress-bar bg-success";
            
            document.getElementById("btn-action").classList.add("d-none");
            document.getElementById("btn-next-topic").classList.remove("d-none");
            document.getElementById("btn-next-topic").innerText = data.nextBtnText;
            
            if(currentTopicIndex === database.length - 1) {
                document.getElementById("btn-next-topic").className = "btn btn-success btn-lg px-5 w-100 mt-2";
            }
        } else {
            // Terdapat kesilapan jawapan: Paksa ulangi senarai salah sahaja
            wrongQuestionsPool = localWrongPool;
            isRemediationLoop = true;
            
            scoreBar.className = "progress-bar bg-danger";
            document.getElementById("btn-action").innerText = `Ulangi ${wrongQuestionsPool.length} Soalan Yang Salah Kesilapan 🔄`;
            document.getElementById("btn-action").className = "btn btn-warning btn-lg px-5 w-100";
            
            // Tukar fungsi butang aksi untuk menjana mod ulangan sekiranya diklik semula
            document.getElementById("btn-action").onclick = function() {
                document.getElementById("loop-status").innerText = `Mod Ulangan Tegas (${wrongQuestionsPool.length} Soalan)`;
                document.getElementById("loop-status").className = "badge bg-danger fs-6";
                document.getElementById("quiz-intro-msg").classList.add("d-none");
                document.getElementById("score-display").classList.add("d-none");
                
                // Set semula reka bentuk butang asal bersiap sedia untuk semakan pusingan baru
                document.getElementById("btn-action").innerText = "Semak Jawapan 🔍";
                document.getElementById("btn-action").className = "btn btn-success btn-lg px-5 w-100";
                document.getElementById("btn-action").onclick = evaluateQuiz;

                renderQuestions(wrongQuestionsPool);
                document.getElementById("quiz-panel").scrollTop = 0;
            };
        }
    }

    // FUNGSI UNTUK MENAIKKAN TOPIK KE ADAT RESAM SETERUSNYA
    function advanceTopic() {
        if (currentTopicIndex < database.length - 1) {
            currentTopicIndex++;
            initTopic();
        } else {
            // Selesai keseluruhan 4 modul adat resam
            document.getElementById("quiz-form").innerHTML = `
                <div class="card text-center p-5 shadow border-0 bg-white">
                    <h1 class="display-3 text-success">🏆</h1>
                    <h2 class="fw-bold text-dark">Tahniah, Anda Bergelar Master Adat Sabah!</h2>
                    <p class="text-muted mt-2">Anda telah berjaya menamatkan kesemua 4 topik adat resam suku kaum dengan skor 100% tulen tanpa ada baki kesalahan.</p>
                    <div class="alert alert-success mt-3 mx-auto" style="max-width: 400px;">
                        🌟 Gred Pencapaian: <b>Cemerlang Tertinggi (A+)</b>
                    </div>
                    <button class="btn btn-primary mt-4 px-4 mx-auto" onclick="location.reload()">Ulang Semula Dari Awal 🔄</button>
                </div>
            `;
            document.getElementById("loop-status").innerText = "Tamat Modul";
            document.getElementById("loop-status").className = "badge bg-success fs-6";
        }
    }

    // Muatan permulaan sebaik sahaja tetingkap dilancarkan
    window.onload = initTopic;
</script>
